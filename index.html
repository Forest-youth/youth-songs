    ul#songList li:hover { background: #f9f9f9; }

      white-space: pre-wrap; font-size: 18px; line-height: 1.6; 
      background: #fdfdfd; padding: 10px; border-radius: 5px;
    }
    
    #backBtn { 
      display: none; width: 100%; padding: 12px; font-size: 16px;

      margin-bottom: 15px;
    }
  </style>
</head>

  let currentTab = "general";
const list = document.getElementById("songList");
let currentSubTab = ""; 

function showTab(tabId) {
    currentTab = tabId;
    currentSubTab = ""; // Скидаємо підкатегорію при зміні основної вкладки

    // Керування видимістю блоку підкатегорій
    const subTabs = document.getElementById('youth-sub-tabs');
    if (tabId === 'youth') {
        subTabs.style.display = 'block';
    } else {
        subTabs.style.display = 'none';
    }

    // Оновлення вигляду кнопок
    document.getElementById('btn-general').classList.remove('active');
    document.getElementById('btn-youth').classList.remove('active');
    document.getElementById('btn-' + tabId).classList.add('active');

    loadSongs();
}

// Нова функція для вибору підкатегорії
function showSubTab(subId) {
    currentSubTab = subId;
    loadSongs();
}

function loadSongs() {
    list.innerHTML = "";
    
    const filtered = Object.keys(songs).filter(title => {
        const song = songs[title];
        
        // Якщо вибрана підкатегорія (хліболамання/пасха), фільтруємо по ній
        if (currentSubTab !== "") {
            return song.type === currentTab && song.subType === currentSubTab;
        }
        
        // Якщо підкатегорія не обрана, просто показуємо категорію (general або youth)
        return song.type === currentTab;
    }).sort((a, b) => a.localeCompare(b, 'uk'));


  filtered.forEach(title => {
    const li = document.createElement("li");
    li.textContent = title;
    li.onclick = () => openSong(title);
    list.appendChild(li);
  });
}

function openSong(title) {
  // --- ПОЧАТОК ЛОГІКИ ТОНАЛЬНОСТІ ---
    currentTransposeStep = 0; // Скидаємо зсув на 0 при відкритті нової пісні
    currentOriginalText = songs[title].text; // Зберігаємо оригінальний текст
    document.getElementById("transpose-controls").style.display = "block"; // Показуємо кнопки
    updateTransposedSong(); // Оновлюємо екран
    // --- КІНЕЦЬ ЛОГІКИ ТОНАЛЬНОСТІ ---
  document.getElementById("mainControls").style.display = "none";
  document.getElementById("songList").style.display = "none";
  document.getElementById("backBtn").style.display = "block";
  window.scrollTo(0, 0);
}

function closeSong() {
  document.getElementById("songContent").textContent = "";
  document.getElementById("mainControls").style.display = "block";
  document.getElementById("songList").style.display = "block";
  document.getElementById("backBtn").style.display = "none";
  document.getElementById("transpose-controls").style.display = "none";
}

function searchSongs() {
  const value = document.getElementById("search").value.toLowerCase();
  list.innerHTML = "";
  
  // При пошуку шукаємо серед усіх пісень, незалежно від вкладки
  const sortedTitles = Object.keys(songs).sort((a, b) => a.localeCompare(b, 'uk'));

  sortedTitles.forEach(title => {
    if (title.toLowerCase().includes(value)) {
      const li = document.createElement("li");
      li.textContent = title;
      li.onclick = () => openSong(title);
      list.appendChild(li);
    }
  });
}

// Запуск при завантаженні
showTab('general');
  // === ЛОГІКА ДЛЯ ЗМІНИ ТОНАЛЬНОСТІ ===
let currentTransposeStep = 0;
let currentOriginalText = ""; // Тут зберігатимемо оригінал тексту

const notes = ["C", "C#", "D", "D#", "E", "F", "F#", "G", "G#", "A", "A#", "H"];

// Оновлена функція зсуву акорду (тепер розуміє H та акорди з дробами)
function transposeChord(chord, step) {
    // Розділяємо акорд, якщо є бас (наприклад D / F#)
    let parts = chord.split('/');
    
    for (let i = 0; i < parts.length; i++) {
        // Додали літеру H в пошук
        let rootMatch = parts[i].match(/^[A-H][#b]?/);
        if (rootMatch) {
            let root = rootMatch[0];
            let suffix = parts[i].substring(root.length);
            
            // Перекладаємо літеру H у стандартну B
            if (root === "H") root = "B";
            
            // Зводимо все до одного стандарту
            if (root === "Db") root = "C#";
            if (root === "Eb") root = "D#";
            if (root === "Gb") root = "F#";
            if (root === "Ab") root = "G#";
            if (root === "A#") root = "Bb"; 
            
            let index = notes.indexOf(root);
            
            if (index !== -1) {
                let newIndex = (((index + step) % 12) + 12) % 12;
                parts[i] = notes[newIndex] + suffix;
            }
        }
    }
    // З'єднуємо назад, якщо був дріб
    return parts.join('/');
}

// Оновлена функція пошуку в тексті (тепер ловить бемолі 'b' і дроби '/')
function transposeSongText(songText, step) {
    if (step === 0) return songText;
    // Регулярний вираз став розумнішим
    return songText.replace(/(^|\s)([A-H][a-zA-Z0-9#b\/]*)(?=\s|$)/g, function(match, space, chord) {
        return space + transposeChord(chord, step);
    });
}
function updateTransposedSong() {
    let updatedText = transposeSongText(currentOriginalText, currentTransposeStep);
    document.getElementById("songContent").textContent = updatedText;
    
    let stepText = currentTransposeStep > 0 ? "+" + currentTransposeStep : currentTransposeStep;
    document.getElementById("current-step").textContent = stepText;
}

document.getElementById("btn-up").addEventListener("click", function() {
    currentTransposeStep++;
    updateTransposedSong();
});

document.getElementById("btn-down").addEventListener("click", function() {
    currentTransposeStep--;
    updateTransposedSong();
});
// === КІНЕЦЬ ЛОГІКИ ТОНАЛЬНОСТІ ===
