<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Християнський збірник</title>
    <link rel="manifest" href="manifest.json">

  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('service-worker.js')
          .then(reg => console.log('Service Worker зареєстровано!', reg))
          .catch(err => console.log('Помилка реєстрації воркера:', err));
      });
    }
    </script>
  <style>
    body { font-family: Arial, sans-serif; padding: 15px; font-size: 18px; line-height: 1.5; }
    h1 { font-size: 24px; text-align: center; }
    
    .tabs { display: flex; gap: 10px; margin-bottom: 15px; }
    .tabs button { 
      flex: 1; padding: 12px; font-size: 16px; cursor: pointer; 
      border: 1px solid #ccc; background: #f0f0f0; border-radius: 5px;
    }
    .tabs button.active { background: #007bff; color: white; border-color: #0056b3; }

    input#search { 
      width: 100%; padding: 12px; font-size: 16px; 
      margin-bottom: 15px; box-sizing: border-box; border: 1px solid #ccc; border-radius: 5px;
    }

    ul#songList { list-style: none; padding: 0; }
    ul#songList li { 
      padding: 12px; border-bottom: 1px solid #eee; cursor: pointer; 
      transition: background 0.2s;
    }
    ul#songList li:hover { background: #f9f9f9; }
pre#songContent { 
      white-space: pre-wrap; font-size: 18px; line-height: 1.6; 
      background: #fdfdfd; padding: 10px; border-radius: 5px;
      font-family: monospace; /* Моноширинний шрифт вкрай важливий, щоб акорди не зсувалися */
    }
    
    /* Новий стиль для акордів */
    .chord {
      color: #dc143c; /* Малиновий колір */
      font-weight: bold;
    }
    pre#songContent { 
      white-space: pre-wrap; font-size: 18px; line-height: 1.6; 
      background: #fdfdfd; padding: 10px; border-radius: 5px;
    }
    
    #backBtn { 
      display: none; width: 100%; padding: 12px; font-size: 16px; 
      background: #6c757d; color: white; border: none; border-radius: 5px; cursor: pointer;
      margin-bottom: 15px;
    }
  </style>
</head>

<body>

<h1>Християнський збірник</h1>

<div id="mainControls">
  <!-- Вкладки (Тепер підкатегорії винесені з .tabs, щоб вони не ламали гнучку розмітку flex) -->
  <div class="tabs">
    <button id="btn-general" onclick="showTab('general')">Загальні</button>
    <button id="btn-youth" onclick="showTab('youth')">Молодіжні</button>
  </div>

  <!-- Блок підкатегорій для молодіжних пісень -->
  <div id="youth-sub-tabs" style="display: none; margin-bottom: 15px; text-align: center;">
    <button class="sub-btn" onclick="showSubTab('breadbreaking')" style="padding: 8px; margin: 2px;">Хліболамання</button>
    <button class="sub-btn" onclick="showSubTab('easter')" style="padding: 8px; margin: 2px;">Пасха</button>
    <button class="sub-btn" onclick="showSubTab('camp')" style="padding: 8px; margin: 2px;">Табір</button>
    <button class="sub-btn" onclick="showSubTab('baptism')" style="padding: 8px; margin: 2px;">Хрещення</button>
  </div>

  <input type="text" id="search" placeholder="Пошук пісні за назвою..." onkeyup="searchSongs()">
</div>

<button id="backBtn" onclick="closeSong()">← Назад до списку</button>

<!-- 
  ОСЬ ЦЕЙ БЛОК МИ ДОДАЛИ! 
  Він містить кнопку id="toggleChordsBtn", яку шукає ваш JS, 
  і має id="chords-controls", який ви вмикаєте/вимикаєте у функціях openSong() та closeSong()
-->
<div id="chords-controls" style="display: none; text-align: right; margin-bottom: 15px;">
    <button id="toggleChordsBtn" style="padding: 8px 16px; font-size: 15px; cursor: pointer; border-radius: 5px; background-color: #007bff; color: white; border: none;">Приховати акорди</button>
</div>

<!-- Блок транспонування (залишається як був) -->
<div id="transpose-controls" style="text-align: center; margin-bottom: 15px; font-weight: bold; display: none;">
    <button id="btn-down" style="padding: 5px 10px; cursor: pointer;">-1 Півтон</button>
    <span id="current-step" style="margin: 0 15px;">0</span>
    <button id="btn-up" style="padding: 5px 10px; cursor: pointer;">+1 Півтон</button>
</div>

<ul id="songList"></ul>

<pre id="songContent"></pre>

let originalSongText = ""; 
let chordsHidden = false;
function highlightChords(text) {
    const chordRegex = /\b[A-GH][b#]?(m|maj|min|sus|aug|dim)?\d*(\/[A-GH][b#]?)?(?=\s|\n|$)/g;
    return text.replace(chordRegex, match => `<span class="chord">${match}</span>`);
}
function initChordsToggle() {
    const toggleBtn = document.getElementById('toggleChordsBtn');
    const songContainer = document.getElementById('songContent');
    if (!toggleBtn || !songContainer) return;
toggleBtn.addEventListener('click', () => {
        chordsHidden = !chordsHidden;
        if (chordsHidden) {
            const chordRegex = /\b[A-GH][b#]?(m|maj|min|sus|aug|dim)?\d*(\/[A-GH][b#]?)?(?=\s|\n|$)/g;

            let lines = songContainer.textContent.split('\n');
            let filteredLines = lines.filter(line => {
                if (line.trim() === '') return true; 
                let lineWithoutChords = line.replace(chordRegex, '').trim();
                return lineWithoutChords !== '';
            });
            let cleanText = filteredLines.join('\n').replace(chordRegex, '');

            songContainer.textContent = cleanText; // Тут залишаємо textContent, бо акорди приховані
            toggleBtn.textContent = 'Показати акорди';
        } else {
            // ЗМІНЕНО ТУТ: виводимо оригінальний текст із підсвіткою акордів
            songContainer.innerHTML = highlightChords(originalSongText);
            toggleBtn.textContent = 'Приховати акорди';
        }
    });
     }

function resetChordsButton() {
    chordsHidden = false;
    const toggleBtn = document.getElementById('toggleChordsBtn');
    if (toggleBtn) toggleBtn.textContent = 'Приховати акорди';
}
window.addEventListener('DOMContentLoaded', initChordsToggle);

let currentTab = "general";
const list = document.getElementById("songList");
let currentSubTab = ""; 
let transposeStep = 0;
let originalSongTextTranspose = "";
  
function showTab(tabId) {
    currentTab = tabId;
    currentSubTab = ""; 

    const subTabs = document.getElementById('youth-sub-tabs');
    if (tabId === 'youth') {
        subTabs.style.display = 'block';
    } else {
        subTabs.style.display = 'none';
    }
    document.getElementById('btn-general').classList.remove('active');
    document.getElementById('btn-youth').classList.remove('active');
    document.getElementById('btn-' + tabId).classList.add('active');

    loadSongs();
}
function showSubTab(subId) {
    currentSubTab = subId;
    loadSongs();
}

function loadSongs() {
    list.innerHTML = "";
    
    const filtered = Object.keys(songs).filter(title => {
        const song = songs[title];
        
        if (currentSubTab !== "") {
            return song.type === currentTab && song.subType === currentSubTab;
        }
        
        return song.type === currentTab;
    }).sort((a, b) => a.localeCompare(b, 'uk'));


  filtered.forEach(title => {
    const li = document.createElement("li");
    li.textContent = title;
    li.onclick = () => openSong(title);
    list.appendChild(li);
  });
}

  const NOTES = ["C","C#","D","D#","E","F","F#","G","G#","A","A#","H"];
const FLATS = {
  "Db":"C#",
  "Eb":"D#",
  "Gb":"F#",
  "Ab":"G#",
  "Bb":"A#"
};

function transposeChord(chord, step){
    let bass = "";
    if(chord.includes("/")){
        let parts = chord.split("/");
        chord = parts[0];
        bass = "/" + transposeChord(parts[1], step);
    }

    let m = chord.match(/^([A-GH][b#]?)(.*)$/);
    if(!m) return chord;
    let root = FLATS[m[1]] || m[1];
    let suffix = m[2];
    let index = NOTES.indexOf(root);
    if(index==-1) return chord;
    index = (index + step + 12) % 12;
    return NOTES[index] + suffix + bass;
}

function transposeSong(step){
    transposeStep += step;
    document.getElementById("current-step").textContent = transposeStep;
    const regex = /\b[A-GH][b#]?(m|maj|min|sus|aug|dim)?\d*(\/[A-GH][b#]?)?\b/g;
    let text = originalSongTextTranspose.replace(regex, c => transposeChord(c, transposeStep));
  document.getElementById("songContent").innerHTML = highlightChords(text);
    originalSongText = text;
}
  
function openSong(title) {
  document.getElementById("songContent").innerHTML = highlightChords(songs[title].text);
 
  originalSongTextTranspose = songs[title].text;
  originalSongText = songs[title].text;
transposeStep = 0;
document.getElementById("current-step").textContent = "0";
document.getElementById("transpose-controls").style.display = "block";

  document.getElementById("mainControls").style.display = "none";
  document.getElementById("songList").style.display = "none";
  document.getElementById("backBtn").style.display = "block";
  document.getElementById("chords-controls").style.display = "block";
  resetChordsButton();
  
  window.scrollTo(0, 0);
}

function closeSong() {
  document.getElementById("songContent").textContent = "";
  document.getElementById("mainControls").style.display = "block";
  document.getElementById("songList").style.display = "block";
  document.getElementById("backBtn").style.display = "none";
  
  document.getElementById("chords-controls").style.display = "none";
  document.getElementById("transpose-controls").style.display = "none";
}

function searchSongs() {
  const value = document.getElementById("search").value.toLowerCase();
  list.innerHTML = "";
  
  // При пошуку шукаємо серед усіх пісень, незалежно від вкладки
  const sortedTitles = Object.keys(songs).sort((a, b) => a.localeCompare(b, 'uk'));

  sortedTitles.forEach(title => {
    if (title.toLowerCase().includes(value)) {
      const li = document.createElement("li");
      li.textContent = title;
      li.onclick = () => openSong(title);
      list.appendChild(li);
    }
  });
}

  document.getElementById("btn-up").onclick = () => transposeSong(1);
document.getElementById("btn-down").onclick = () => transposeSong(-1);
showTab('general');
